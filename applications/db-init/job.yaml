apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: default
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: db-init
        image: postgres:15
        command:
        - /bin/sh
        - -c
        - |
          echo "Connecting to PostgreSQL..."
          
          # connect to default postgres db to create all databases
          PGPASSWORD=$DB_PASSWORD psql \
            -h $DB_HOST \
            -U $DB_USER \
            -d postgres \
            -c "CREATE DATABASE rider_db;" || echo "rider_db already exists"
          
          PGPASSWORD=$DB_PASSWORD psql \
            -h $DB_HOST \
            -U $DB_USER \
            -d postgres \
            -c "CREATE DATABASE driver_db;" || echo "driver_db already exists"
          
          PGPASSWORD=$DB_PASSWORD psql \
            -h $DB_HOST \
            -U $DB_USER \
            -d postgres \
            -c "CREATE DATABASE trip_db;" || echo "trip_db already exists"
          
          PGPASSWORD=$DB_PASSWORD psql \
            -h $DB_HOST \
            -U $DB_USER \
            -d postgres \
            -c "CREATE DATABASE matching_db;" || echo "matching_db already exists"
          
          echo "All databases created successfully"
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: rider-aws-secret
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: rider-aws-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rider-aws-secret
              key: DB_PASSWORD